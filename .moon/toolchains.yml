# https://moonrepo.dev/docs/config/toolchain
$schema: "https://moonrepo.dev/schemas/toolchains.json"

# Extend and inherit an external configuration file. Must be a valid HTTPS URL or file system path.
# extends: './shared/toolchains.yml'

# Shared JavaScript settings (applies across node, pnpm, etc.).
javascript:
  # The package manager to use when managing dependencies.
  # Accepts "npm" (default), "pnpm", "yarn", or "bun".
  packageManager: "pnpm"

  # Dedupe dependencies after the lockfile has changed.
  dedupeOnLockfileChange: true

  # Infer and automatically create moon tasks from `package.json` scripts, per project.
  # BEWARE: Tasks and scripts are not 1:1 in functionality, so please refer to the documentation.
  inferTasksFromScripts: false

  # Sync a project's `dependsOn` as dependencies within the project's `package.json`.
  syncProjectWorkspaceDependencies: true

# Configures Node.js within the toolchain. moon manages its own version of Node.js
# instead of relying on a version found on the host machine. This ensures deterministic
# and reproducible builds across any machine.
node:
  # The version to use. Must be a semantic version that includes major, minor, and patch.
  # We suggest using the latest active LTS version: https://nodejs.org/en/about/releases
  # Updated to 20.17.0 for npm 11.6.2 compatibility (required for OIDC)
  version: "20.17.0"

# The version of the package manager (pnpm) to use.
pnpm:
  version: "10.17.1"

rust:
  # Pinned for reproducible CI / local builds; synced with sdk/rust-toolchain.toml
  version: "1.88.0"
  # Required for `sdk:lint` (`cargo clippy`) and `sdk:fmt-check` (`cargo fmt`);
  # Moon's minimal Rust install omits these on Linux CI otherwise.
  components:
    - clippy
    - rustfmt
