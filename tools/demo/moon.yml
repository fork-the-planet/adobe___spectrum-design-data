layer: tool
language: bash

tasks:
  verify:
    command: [bash, tools/demo/verify-demo.sh]
    options:
      runFromWorkspaceRoot: true
    inputs:
      - "verify-demo.sh"
      - "demo-commands.sh"
      - "broken-token-example.tokens.json"

  # Render a demo manifest's silent VHS assets (per-beat MP4s + full GIF/WebM).
  # Pass a manifest with: moon run demo:videos-render -- tools/demo/videos/<name>.demo.mjs
  videos-render:
    command: [node, tools/demo/videos/render.mjs]
    options:
      runFromWorkspaceRoot: true
      # Operator-only: needs `vhs` (+ ttyd/ffmpeg) on PATH, not available in CI.
      runInCI: false
    inputs:
      - "videos/**/*.mjs"

  # Record one voiceover clip per beat (interactive teleprompter; needs a mic + TTY).
  videos-record:
    command: [node, tools/demo/videos/record.mjs]
    options:
      runFromWorkspaceRoot: true
      runInCI: false

  # Sync recorded audio to the rendered beats and assemble the narrated MP4 + captions.
  videos-build:
    command: [node, tools/demo/videos/build.mjs]
    options:
      runFromWorkspaceRoot: true
      # Operator-only: consumes render.mjs output + recorded audio (ffmpeg), not in CI.
      runInCI: false
    inputs:
      - "videos/**/*.mjs"

  # ── Slidev presentation deck (asciinema casts + recorded AI/MCP video) ──────
  # The deck is a standalone project under presentation/ (not in the pnpm
  # workspace, to keep the root lockfile clean). Install its deps once with
  # --ignore-workspace so it gets its own isolated node_modules/lockfile:
  #   pnpm install --ignore-workspace --dir tools/demo/presentation
  # then record casts with presentation/record-casts.sh (see RECORDING.md).

  # Live dev server — screen-share this and narrate; each beat auto-pauses.
  present:
    command: [pnpm, --dir, tools/demo/presentation, run, dev]
    options:
      runFromWorkspaceRoot: true
    preset: "server"

  # Static export of the deck (shareable site under presentation/dist/).
  present-build:
    command: [pnpm, --dir, tools/demo/presentation, run, build]
    options:
      runFromWorkspaceRoot: true
      # Operator-only: the deck is a standalone install (--ignore-workspace), so
      # its node_modules/slidev aren't present in CI's workspace install.
      runInCI: false
    inputs:
      - "presentation/slides.md"
      - "presentation/public/**/*"
      - "presentation/package.json"

  # ── rmux-driven automated verification + cast recording ──────────────────
  # auto-demo.sh drives each demo via rmux send-keys/capture-pane, asserts
  # expected output (--verify, CI-able for A/B/C), and optionally emits an
  # asciinema v2 .cast with beat markers (--record, operator-only).
  #
  # A, B, C: deterministic (TUI/CLI) — suitable for CI.
  # D: non-deterministic (Claude Code + MCP) — local-only, needs Claude auth.

  # CI-able: drive demos A, B, C and assert expected output.
  # D is excluded — it needs Claude auth/network (run auto-demo-d manually).
  auto-verify:
    command: [
        bash,
        -c,
        "bash tools/demo/auto/auto-demo.sh A --verify &&
        bash tools/demo/auto/auto-demo.sh B --verify &&
        bash tools/demo/auto/auto-demo.sh C --verify",
      ]
    options:
      runFromWorkspaceRoot: true
      # Needs rmux on PATH and a real display/PTY; not suitable for headless CI runners.
      runInCI: false
    inputs:
      - "auto/**/*.sh"
      - "packages/design-data/tokens/**"
      - "packages/design-data/components/**"

  # Verify Demo D locally (Claude Code + MCP; non-deterministic; local only).
  auto-verify-d:
    command: [bash, tools/demo/auto/auto-demo.sh, D, --verify]
    options:
      runFromWorkspaceRoot: true
      runInCI: false

  # Record all four casts to presentation/public/casts/ (operator-only).
  auto-record:
    command: [
        bash,
        -c,
        "bash tools/demo/auto/auto-demo.sh A --record &&
        bash tools/demo/auto/auto-demo.sh B --record &&
        bash tools/demo/auto/auto-demo.sh C --record &&
        bash tools/demo/auto/auto-demo.sh D --record",
      ]
    options:
      runFromWorkspaceRoot: true
      runInCI: false

  # Ad-hoc TUI verification runner (Tier 2 of the tui-verify skill).
  # Drives the real binary in an rmux pane and asserts expected output.
  # Pass --dataset and --steps arguments after --:
  #   moon run demo:tui-verify -- --dataset packages/design-data --steps my-steps.txt
  tui-verify:
    command: [bash, tools/demo/auto/verify-tui.sh]
    options:
      runFromWorkspaceRoot: true
      # Needs rmux on PATH and a real PTY — not suitable for headless CI runners.
      runInCI: false
    inputs:
      - "auto/verify-tui.sh"
      - "auto/lib/rmux-drive.sh"

  ci:
    deps: [verify]
