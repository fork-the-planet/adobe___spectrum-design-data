$schema: "https://moonrepo.dev/schemas/project.json"
layer: tool
fileGroups:
  sources:
    - "src/**/*.{ts,js,html,css}"
  tests:
    - "src/**/*.test.js"
  configs:
    - "*.config.{js,ts,mjs,cjs}"
    - "webpack.config.cjs"
tasks:
  build:
    command:
      - pnpm
      - run
      - build
    inputs:
      - "@globs(sources)"
      - "@globs(configs)"
      - "package.json"
      - "manifest.json"
      - "scripts/*.mjs"
    outputs:
      - "dist/"
  test:
    command:
      - pnpm
      - test
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
      - "ava.config.js"
      - "tsconfig.test.json"
    outputs:
      - "build/"
  lint:
    command:
      - pnpm
      - run
      - lint
    inputs:
      - "@globs(sources)"
      - "eslint.config.mjs"
  type-check:
    command:
      - pnpm
      - run
      - type-check
    inputs:
      - "@globs(sources)"
      - "tsconfig.json"
  validate:
    command:
      - pnpm
      - run
      - validate
    deps:
      - type-check
      - lint
