$schema: "https://moonrepo.dev/schemas/project.json"
layer: tool
tasks:
  start:
    command:
      - node
      - src/cli.js
    preset: "server"
  test:
    command:
      - pnpm
      - ava
  bundle:
    # Produce design-data.mcpb — a self-contained Claude Desktop Extension archive.
    #
    # Steps:
    #   1. scripts/generate-mcpb.mjs stages src/, vendors all runtime deps (including
    #      workspace:* packages via recursive copyDependencyTree with dereference:true),
    #      generates icon.png from site/adobe_logo.svg via sharp, and writes manifest.json
    #      (manifest_version 0.3) auto-versioned from package.json.
    #   2. npx @anthropic-ai/mcpb validate checks the staged bundle.
    #   3. npx @anthropic-ai/mcpb pack produces dist/design-data.mcpb.
    command:
      - bash
      - -c
      - >-
        node scripts/generate-mcpb.mjs &&
        pnpm exec mcpb validate dist/design-data-mcp-bundle &&
        pnpm exec mcpb pack dist/design-data-mcp-bundle dist/design-data.mcpb
    inputs:
      - src/**/*
      - scripts/generate-mcpb.mjs
      - README.md
      - package.json
      - $workspaceRoot/site/adobe_logo.svg
      - $workspaceRoot/LICENSE
    outputs:
      - dist/design-data.mcpb
