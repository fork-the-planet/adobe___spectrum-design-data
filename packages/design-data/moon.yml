$schema: "https://moonrepo.dev/schemas/project.json"
layer: library
fileGroups:
  tokens:
    - "tokens/**/*.tokens.json"
  registry:
    - "registry/**/*.json"
  catalogs:
    - "components/**/*.json"
    - "fields/**/*.json"
    - "mode-sets/**/*.json"
  guidelines:
    - "guidelines/**/*.json"

tasks:
  # Validate registry JSON files against registry-value.json schema (AJV).
  # Also checks for duplicate IDs/aliases, multiple defaults, and stale relatedTerms refs.
  #
  # CANONICAL for registry semantics: `validate-dataset` (SDK) also schema-shape
  # validates registry/*.json, but only this Node/AJV task performs the richer
  # semantic checks (duplicate IDs/aliases, multiple defaults, stale relatedTerms).
  # Keep this task until the registry semantics are ported to the SDK (PR-B).
  validate-registry:
    command: node
    args:
      - scripts/validate-registry.js
    inputs:
      - "@globs(registry)"
      - "scripts/validate-registry.js"
      - "/packages/design-data-spec/schemas/registry-value.json"

  # Ad-hoc report: groups SPEC-009 (name-field-enum-sync) warnings from `validate`
  # by name.<field> and unique value, so the registry-completeness backlog is a
  # trackable metric instead of a wall of duplicate-shaped lines. Not part of the
  # `validate` dependency chain — run manually. See beads epic spectrum-design-data-dm2.
  spec009-report:
    command: node
    args:
      - scripts/spec009-report.js
    options:
      runInCI: false
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
      - "scripts/spec009-report.js"
      - "/packages/tokens/naming-exceptions.json"

  # Validate guideline JSON files against guideline.schema.json (AJV + document-block $ref).
  validate-guidelines:
    command: node
    args:
      - scripts/validate-guidelines.js
    inputs:
      - "@globs(guidelines)"
      - "scripts/validate-guidelines.js"
      - "/packages/design-data-spec/schemas/guideline.schema.json"
      - "/packages/design-data-spec/schemas/document-block.schema.json"

  # Validate the whole dataset: SPEC-044 directory-structure pre-check, token
  # rules, and Layer 1 schema-shape validation of the registered catalog
  # directories (fields/, components/, mode-sets/, registry/).
  validate-dataset:
    command: ../../sdk/target/debug/design-data
    args:
      - validate-dataset
      - ./
      - --spec-schemas
      - ../design-data-spec/schemas
      - --exceptions-path
      - ../tokens/naming-exceptions.json
    toolchain: "system"
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
      - "@globs(catalogs)"
      - "@globs(registry)"
      - "/packages/tokens/naming-exceptions.json"
      - "/packages/design-data-spec/schemas/**/*.json"

  # Validate the cascade token files against the design-data spec rules.
  # Aggregates the full dataset validation (validate-dataset) and registry
  # validation so `moon run design-data:validate` covers tokens, fields,
  # components, mode-sets, and registry.
  # Note: `validate` uses --exceptions-path; `migrate convert` uses --exceptions.
  # These are different subcommands with different flag names.
  validate:
    command: ../../sdk/target/debug/design-data
    args:
      - validate
      - ./tokens
      - --exceptions-path
      - ../tokens/naming-exceptions.json
    toolchain: "system"
    deps:
      - sdk:build
      - ~:validate-dataset
      - ~:validate-registry
    inputs:
      - "@globs(tokens)"
      - "/packages/tokens/naming-exceptions.json"

  # Regenerate packages/tokens/src/ from the cascade source of truth.
  # Run this after editing any tokens/*.tokens.json file to keep the
  # legacy package in sync for downstream consumers.
  legacy-output:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - legacy-output
      - ./tokens
      - --output
      - ../tokens/src
    toolchain: "system"
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
    outputs:
      - "/packages/tokens/src/**/*.json"

  # CI guard: verify that packages/tokens/src/ is in sync with the cascade
  # source. Fails if a PR updates cascade tokens without re-running legacy-output.
  roundtrip-verify:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - roundtrip-verify
      - ../tokens/src
    toolchain: "system"
    deps:
      - sdk:build
    inputs:
      - "@globs(tokens)"
      - "/packages/tokens/src/**/*.json"

  # ONE-TIME / ESCAPE HATCH — Re-sync cascade files from the legacy package.
  # Use this only when upstream legacy changes need to be pulled into cascade
  # before the full migration is complete. Under normal operation, all edits
  # go into tokens/*.tokens.json (cascade), not packages/tokens/src/ (legacy).
  #
  # WARNING: this task OVERWRITES the cascade token files. Do not run it
  # routinely — doing so would discard any hand-authored taxonomy improvements
  # in the cascade source.
  regenerate-from-legacy:
    command: ../../sdk/target/debug/design-data
    args:
      - migrate
      - convert
      - ../tokens/src
      - --output
      - ./tokens
      - --names-dir
      - ../token-names/names
      - --exceptions
      - ../tokens/naming-exceptions.json
    toolchain: "system"
    options:
      # Operator-only escape hatch: this task OVERWRITES the cascade source of
      # truth (./tokens). `moon ci` runs every affected task regardless of the
      # missing `outputs`, so editing this project's moon.yml would otherwise
      # trip this destructive task and clobber the committed tokens before
      # `validate` runs. Keep it out of CI entirely.
      runInCI: false
    deps:
      - sdk:build
    inputs:
      - "/packages/tokens/src/**/*.json"
      - "/packages/token-names/names/**/*.json"
      - "/packages/tokens/naming-exceptions.json"
    # No `outputs:` — prevents moon from auto-running this task as part of
    # dependency graphs and silently clobbering hand-edited cascade tokens.
