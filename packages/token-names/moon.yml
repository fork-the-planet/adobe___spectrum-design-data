$schema: "https://moonrepo.dev/schemas/project.json"
layer: library
fileGroups:
  names:
    - "names/**/*.json"
  tests:
    - "test/**/*.test.js"
  scripts:
    - "scripts/**/*.mjs"
tasks:
  test:
    command: [pnpm, ava, "test/**/*.test.js"]
    inputs:
      - "@globs(names)"
      - "@globs(tests)"
      - "package.json"
      - "ava.config.js"

  check:
    command:
      - node
      - scripts/check-coverage.mjs
    inputs:
      - "@globs(names)"
      - "@globs(scripts)"

  ci:
    deps: [test, check]
