# Validation rule catalog (Layer 2) — stable IDs for diagnostics and conformance.
# spec_version aligns with the human-readable spec (see spec/index.md).
spec_version: "1.0.0-draft"
rules:
  - id: SPEC-001
    name: alias-target-exists
    severity: error
    category: reference-integrity
    assert: Every alias $ref MUST resolve to an existing token in the dataset.
    message: "Alias target not found for $ref: {path}"
    spec_ref: spec/token-format.md#alias-ref
    introduced_in: "1.0.0-draft"

  - id: SPEC-002
    name: alias-type-compatibility
    severity: error
    category: type-safety
    assert: Resolved alias target MUST have a value type compatible with the referencing token’s expected type.
    message: "Alias {path} resolves to incompatible type"
    spec_ref: spec/token-format.md#literal-value
    introduced_in: "1.0.0-draft"

  - id: SPEC-003
    name: no-circular-aliases
    severity: error
    category: reference-integrity
    assert: Alias chains MUST NOT contain cycles.
    message: "Circular alias chain detected involving {path}"
    spec_ref: spec/token-format.md#alias-ref
    introduced_in: "1.0.0-draft"

  - id: SPEC-004
    name: uuid-global-uniqueness
    severity: error
    category: completeness
    assert: Token uuid values MUST be unique across all token documents in the dataset.
    message: "Duplicate uuid {uuid}"
    spec_ref: spec/token-format.md#lifecycle-and-metadata
    introduced_in: "1.0.0-draft"

  - id: SPEC-005
    name: cascade-coverage
    severity: error
    category: completeness
    assert: Dimension declarations MUST satisfy coverage rules (e.g. default ∈ modes; peer mode requirements from coverage metadata).
    message: "Dimension coverage violation for {dimension}"
    spec_ref: spec/dimensions.md#coverage-validation
    introduced_in: "1.0.0-draft"

  - id: SPEC-006
    name: specificity-correctness
    severity: warning
    category: type-safety
    assert: When two tokens from the same layer match a context with equal specificity, the tie MUST be broken by document order (earlier in file wins; lexicographically earlier file path wins across files). Ties MUST be reported as warnings.
    message: "Ambiguous cascade resolution (specificity tie) between {token_a} and {token_b} for context {context}; resolved by document order"
    spec_ref: spec/cascade.md#semantic-specificity
    introduced_in: "1.0.0-draft"

  - id: SPEC-007
    name: name-roundtrip
    severity: warning
    category: naming-consistency
    assert: Every legacy token name MUST be reproducible from a structured name object via deterministic generation rules, unless listed in naming-exceptions.json.
    message: "Token '{token}' does not roundtrip through name-object generation rules"
    spec_ref: spec/token-format.md#name-object
    introduced_in: "1.0.0-draft"

  - id: SPEC-008
    name: cascade-completeness
    severity: warning
    category: completeness
    assert: For every cascade token that has a non-default mode variant, a base/default variant (name object with no dimension fields for that dimension, or explicitly the default mode value) MUST also exist in the dataset. Ensures all consumers can resolve without a fallback gap.
    message: "Token property '{property}' has mode variant '{mode}' but no base/default variant"
    spec_ref: spec/cascade.md#coverage
    introduced_in: "1.0.0-draft"

  - id: SPEC-009
    name: name-field-enum-sync
    severity: warning
    category: naming-consistency
    assert: Recognized name object fields (component, state, variant, etc.) SHOULD use values drawn from the corresponding design-system-registry enums when those enums are available.
    message: "Token name field '{field}' value '{value}' is not in the design-system-registry enum for '{field}'"
    spec_ref: spec/token-format.md#name-object
    introduced_in: "1.0.0-draft"

  - id: SPEC-010
    name: replaced-by-target-exists
    severity: error
    category: reference-integrity
    assert: Every UUID in replaced_by MUST resolve to an existing token in the dataset.
    message: "replaced_by target UUID not found: {uuid}"
    spec_ref: spec/token-format.md#lifecycle-and-metadata
    introduced_in: "1.0.0-draft"

  - id: SPEC-011
    name: replaced-by-array-requires-comment
    severity: error
    category: completeness
    assert: When replaced_by is an array, deprecated_comment MUST be present to explain which replacement applies in which context.
    message: "replaced_by is an array but deprecated_comment is missing on token {token}"
    spec_ref: spec/token-format.md#lifecycle-and-metadata
    introduced_in: "1.0.0-draft"

  - id: SPEC-012
    name: replaced-by-requires-deprecated
    severity: error
    category: completeness
    assert: If replaced_by is present, deprecated MUST also be present.
    message: "Token {token} has replaced_by but is not marked deprecated"
    spec_ref: spec/token-format.md#lifecycle-and-metadata
    introduced_in: "1.0.0-draft"

  - id: SPEC-013
    name: planned-removal-requires-deprecated
    severity: error
    category: completeness
    assert: If plannedRemoval is present, deprecated MUST also be present.
    message: "Token {token} has plannedRemoval but is not marked deprecated"
    spec_ref: spec/token-format.md#lifecycle-and-metadata
    introduced_in: "1.0.0-draft"

  - id: SPEC-014
    name: composite-inline-alias-exists
    severity: error
    category: reference-integrity
    assert: Inline alias references ({token-name}) within composite values MUST resolve to an existing token in the dataset.
    message: "Inline alias target not found within composite value: {path}"
    spec_ref: spec/token-format.md#inline-alias-references
    introduced_in: "1.0.0-draft"

  - id: SPEC-015
    name: composite-inline-alias-type-compatible
    severity: error
    category: type-safety
    assert: Resolved inline alias target within a composite value MUST have a value type compatible with the sub-value's expected type.
    message: "Inline alias {path} within composite resolves to incompatible type"
    spec_ref: spec/token-format.md#inline-alias-references
    introduced_in: "1.0.0-draft"

  - id: SPEC-016
    name: value-type-match
    severity: error
    category: type-safety
    assert: When $valueType is present on a token with a literal value, the value MUST validate against the referenced value-type schema.
    message: "Token {token} value does not validate against declared $valueType schema {schema}"
    spec_ref: spec/token-format.md#value-type-declaration-valuetype
    introduced_in: "1.0.0-draft"

  - id: SPEC-017
    name: string-name-tech-debt
    severity: warning
    category: tech-debt
    assert: Token names SHOULD be structured name objects. A plain string name is permitted as a temporary escape hatch but MUST be treated as tech debt and tracked for remediation.
    message: 'Token "{name}" uses a string name instead of a name object — treat as tech debt and plan remediation'
    spec_ref: spec/token-format.md#string-name-escape-hatch
    introduced_in: "1.0.0-draft"

  - id: SPEC-018
    name: component-name-exists
    severity: error
    category: reference-integrity
    assert: Token name-object 'component' field value MUST match the 'name' of a declared component in the dataset.
    message: "Token '{token}' references undeclared component '{component}'"
    spec_ref: spec/component-format.md#name
    introduced_in: "1.0.0-draft"

  - id: SPEC-019
    name: component-variant-valid
    severity: error
    category: reference-integrity
    assert: Token name-object 'variant' field value MUST match a value in the declared 'variant' option enum for the referenced component, when that enum exists.
    message: "Token '{token}' has variant '{variant}' which is not declared on component '{component}'"
    spec_ref: spec/component-format.md#options
    introduced_in: "1.0.0-draft"

  - id: SPEC-020
    name: component-anatomy-valid
    severity: error
    category: reference-integrity
    assert: Token name-object 'anatomy' field value MUST match the 'name' of a declared anatomy part on the referenced component.
    message: "Token '{token}' references undeclared anatomy part '{anatomy}' on component '{component}'"
    spec_ref: spec/component-format.md#anatomy-stub
    introduced_in: "1.0.0-draft"

  - id: SPEC-021
    name: component-slot-vocabulary
    severity: warning
    category: component-contract
    assert: Component slot declarations with a 'name' outside the canonical slot vocabulary SHOULD include a 'description' field documenting the custom slot's purpose.
    message: "Component '{component}' has custom slot '{slot}' with no description — add a description or use a canonical slot name"
    spec_ref: spec/component-format.md#canonical-slot-vocabulary
    introduced_in: "1.0.0-draft"

  - id: SPEC-022
    name: component-state-valid
    severity: error
    category: reference-integrity
    assert: Token name-object 'state' field value MUST match the 'name' of a declared state on the referenced component, when state declarations are present.
    message: "Token '{token}' references undeclared state '{state}' on component '{component}'"
    spec_ref: spec/component-format.md#spec-rules
    introduced_in: "1.0.0-draft"

  - id: SPEC-023
    name: anatomy-custom-part-documented
    severity: warning
    category: component-contract
    assert: Anatomy part declarations with a 'name' outside the canonical anatomy vocabulary SHOULD include a 'description' field.
    message: "Component '{component}' has custom anatomy part '{part}' with no description"
    spec_ref: spec/anatomy-format.md#canonical-anatomy-vocabulary
    introduced_in: "1.0.0-draft"

  - id: SPEC-024
    name: anatomy-part-name-unique
    severity: error
    category: component-contract
    assert: Anatomy part names within a single component's anatomy array MUST be unique.
    message: "Component '{component}' declares duplicate anatomy part name '{part}'"
    spec_ref: spec/anatomy-format.md#name
    introduced_in: "1.0.0-draft"

  - id: SPEC-025
    name: anatomy-requires-component
    severity: error
    category: reference-integrity
    assert: A token name object MUST NOT include an 'anatomy' field unless a 'component' field is also present.
    message: "Token '{token}' has 'anatomy' field without a 'component' field"
    spec_ref: spec/anatomy-format.md#cross-reference-with-token-name-objects
    introduced_in: "1.0.0-draft"

  - id: SPEC-026
    name: state-custom-name-documented
    severity: warning
    category: component-contract
    assert: State declarations with a 'name' outside the canonical state vocabulary SHOULD include a 'description' field.
    message: "Component '{component}' has custom state '{state}' with no description"
    spec_ref: spec/state-model.md#canonical-state-vocabulary
    introduced_in: "1.0.0-draft"

  - id: SPEC-027
    name: token-binding-token-exists
    severity: error
    category: reference-integrity
    assert: Each tokenBindings[].token value in a component declaration MUST match the name of a declared token in the dataset.
    message: "Component '{component}' tokenBindings references unknown token '{token}'"
    spec_ref: spec/component-format.md#token-bindings
    introduced_in: "1.0.0-draft"

  - id: SPEC-028
    name: document-block-agents-equals-content
    severity: warning
    category: completeness
    assert: >
      A document block's agents field, when present, SHOULD contain phrasing that differs from
      content. An identical copy provides no agent-specific value and SHOULD be omitted or refined.
      Applies to tokens, components, and anatomy parts.
    message: "'{entity}' has a document block whose agents text is identical to content — tailor it for agent consumption or omit the agents field"
    spec_ref: spec/document-blocks.md
    introduced_in: "1.0.0-draft"

  - id: SPEC-029
    name: document-block-missing-purpose
    severity: warning
    category: completeness
    assert: >
      An entity that carries a non-empty documentBlocks array SHOULD include at least one block
      with type 'purpose' to document the entity's intent.
      Applies to tokens, components, and anatomy parts.
    message: "'{entity}' has documentBlocks but no purpose block — add a block with type 'purpose'"
    spec_ref: spec/document-blocks.md
    introduced_in: "1.0.0-draft"

  - id: SPEC-030
    name: accessibility-empty
    severity: warning
    category: completeness
    assert: >
      A component declaration that carries an accessibility object SHOULD populate at least one
      of the five known fields (role, intents, focusable, keyboardIntents, wcag). An entirely
      empty accessibility object provides no semantic value and should be populated or removed.
    message: "Component '{entity}' has an empty accessibility object — populate at least one field or remove the property"
    spec_ref: spec/accessibility.md
    introduced_in: "1.0.0-draft"

  - id: SPEC-031
    name: accessibility-wcag-missing
    severity: warning
    category: completeness
    assert: >
      A component whose accessibility declaration includes a role SHOULD also include a non-empty
      wcag array listing applicable WCAG 2.x success criteria. WCAG citations improve audit
      traceability for components with a named semantic role.
    message: "Component '{entity}' accessibility has a role but no wcag entries — add applicable WCAG 2.x success criteria"
    spec_ref: spec/accessibility.md
    introduced_in: "1.0.0-draft"
