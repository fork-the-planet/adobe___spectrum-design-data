$schema: "https://moonrepo.dev/schemas/project.json"
stack: frontend
layer: application
tags:
  - docs
  - site
tasks:
  clean:
    command:
      - sh
      - -c
      - "mkdir -p ../../site && rm -rf ../../site/s2-tokens-viewer && mkdir -p ../../site/s2-tokens-viewer"
    toolchain: "system"
  prepare:
    command:
      - node
      - scripts/prepare.mjs
    deps:
      - tokens:build
    inputs:
      - package.json
      - node_modules/@adobe/spectrum-tokens/src/**/*
      - node_modules/@adobe/spectrum-tokens/package.json
    outputs:
      - tokens/
  resolve:
    command:
      - node
      - scripts/resolve.mjs
    deps:
      - sdk-wasm:build
      - ~:prepare
    inputs:
      - scripts/resolve.mjs
      - tokens/**/*.json
    outputs:
      - tokens/resolved.json
  export:
    command:
      - sh
      - -c
      - "mkdir -p ../../site/s2-tokens-viewer && cp -r ./index.html ../../site/s2-tokens-viewer/ && cp -r ./css ../../site/s2-tokens-viewer/ && cp -r ./data ../../site/s2-tokens-viewer/ && cp -r ./tokens ../../site/s2-tokens-viewer/"
    deps:
      - ~:resolve
    toolchain: "system"
    outputs:
      - /site/s2-tokens-viewer/
