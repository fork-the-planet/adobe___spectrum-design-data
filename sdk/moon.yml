$schema: "https://moonrepo.dev/schemas/project.json"
language: rust
layer: library
fileGroups:
  sources:
    - "core/src/**/*.rs"
    - "cli/src/**/*.rs"
    - "tui/src/**/*.rs"
    - "core/Cargo.toml"
    - "cli/Cargo.toml"
    - "tui/Cargo.toml"
    - "Cargo.toml"
    - "rust-toolchain.toml"
tasks:
  codegen:
    command: node
    args:
      - scripts/generate-registry-data.js
    inputs:
      - "/packages/design-data/registry/*.json"
    outputs:
      - "core/src/registry_data.rs"
  codegen-check:
    command: node
    args:
      - scripts/generate-registry-data.js
      - --check
    inputs:
      - "/packages/design-data/registry/*.json"
      - "core/src/registry_data.rs"
  build:
    command: cargo
    args:
      - build
      - --workspace
    inputs:
      - "@globs(sources)"
      - "core/src/registry_data.rs"
      # Embedded snapshot sources — invalidate the build when token data changes.
      - "/packages/tokens/src/*.json"
      - "/packages/tokens/schemas/**/*.json"
      - "/packages/tokens/naming-exceptions.json"
      - "/packages/tokens/manifest.json"
      - "/packages/design-data/mode-sets/*.json"
      - "/packages/design-data/components/*.json"
      - "/packages/design-data/fields/*.json"
    deps:
      - codegen-check
  test:
    command: cargo
    args:
      - test
      - --workspace
    inputs:
      - "@globs(sources)"
      - "core/src/registry_data.rs"
      # Embedded snapshot sources — re-run tests when token data changes.
      - "/packages/tokens/src/*.json"
      - "/packages/tokens/schemas/**/*.json"
      - "/packages/tokens/naming-exceptions.json"
      - "/packages/tokens/manifest.json"
      - "/packages/design-data/mode-sets/*.json"
      - "/packages/design-data/components/*.json"
      - "/packages/design-data/fields/*.json"
    deps:
      - codegen-check
  fmt:
    command: cargo
    args:
      - fmt
      - --all
    inputs:
      - "@globs(sources)"
    options:
      runInCI: false
  fmt-check:
    command: cargo
    args:
      - fmt
      - --all
      - "--"
      - --check
    inputs:
      - "@globs(sources)"
  lint:
    command: cargo
    args:
      - clippy
      - --workspace
      - --
      - -D
      - warnings
    inputs:
      - "@globs(sources)"
  tui:
    command: cargo
    args:
      - run
      - -p
      - design-data-cli
      - --release
      - --
      - packages/tokens/dist/json
      - --theme
      - spectrum
      - --no-resume-wizard
    toolchain: "system"
    options:
      runInCI: false
  version:
    command: node
    args:
      - scripts/sync-cargo-version.mjs
    inputs:
      - "tui/package.json"
    outputs:
      - "tui/Cargo.toml"
