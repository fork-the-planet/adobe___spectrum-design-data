$schema: "https://moonrepo.dev/schemas/project.json"
language: rust
layer: library
fileGroups:
  sources:
    - "core/src/**/*.rs"
    - "cli/src/**/*.rs"
    - "tui/src/**/*.rs"
    - "core/Cargo.toml"
    - "cli/Cargo.toml"
    - "tui/Cargo.toml"
    - "Cargo.toml"
    - "rust-toolchain.toml"
tasks:
  codegen:
    command: node
    args:
      - scripts/generate-registry-data.js
    inputs:
      - "/packages/design-system-registry/registry/*.json"
    outputs:
      - "core/src/registry_data.rs"
    platform: node
  codegen-check:
    command: node
    args:
      - scripts/generate-registry-data.js
      - --check
    inputs:
      - "/packages/design-system-registry/registry/*.json"
      - "core/src/registry_data.rs"
    platform: node
  build:
    command: cargo
    args:
      - build
      - --workspace
    inputs:
      - "@globs(sources)"
      - "core/src/registry_data.rs"
    deps:
      - codegen-check
  test:
    command: cargo
    args:
      - test
      - --workspace
    inputs:
      - "@globs(sources)"
      - "core/src/registry_data.rs"
    deps:
      - codegen-check
  lint:
    command: cargo
    args:
      - clippy
      - --workspace
      - --
      - -D
      - warnings
    inputs:
      - "@globs(sources)"
  tui:
    command: cargo
    args:
      - run
      - -p
      - design-data-cli
      - --release
      - --
      - packages/tokens/dist/json
      - --theme
      - spectrum
      - --no-resume-wizard
    platform: system
    local: true
  version:
    command: node
    args:
      - scripts/sync-cargo-version.mjs
    inputs:
      - "cli/package.json"
      - "tui/package.json"
    outputs:
      - "cli/Cargo.toml"
      - "tui/Cargo.toml"
    platform: node
