name: Release

on:
  push:
    branches:
      - main
      - beta

concurrency: ${{ github.workflow }}-${{ github.ref }}

# ──────────────────────────────────────────────────────────────────────────────
# Two-phase release pipeline:
#
#   Phase 1 — `changesets`  (every push)
#     Runs the changesets action in version-only mode. On a changeset push this
#     creates or updates the "Version Packages" PR. On the version-PR merge it
#     does nothing (no pending changesets) and exposes hasChangesets=false.
#
#   Phase 2 — `build-binaries` + `release`  (version-PR merge only)
#     Both jobs gate on hasChangesets==false.
#     `build-binaries` compiles the Rust CLI for all four platforms in a matrix
#     and uploads the binaries as GitHub Actions artifacts.
#     `release` publishes npm packages via changeset publish (OIDC), then
#     downloads the built artifacts and attaches them to the GitHub Release
#     tagged by the design-data-cli Cargo.toml version. Only an actual binary
#     build failure blocks the publish.
#
# The native design-data-cli binary is delivered via GitHub Releases (and
# optionally cargo install / Homebrew). The @adobe/design-data npm package is
# now the JS/wasm library glue, not a CLI launcher.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Phase 1: always runs ────────────────────────────────────────────────────
  changesets:
    name: Changesets (version PR)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.cs.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"

      - run: npm install -g npm@11.6.2

      - run: npm install -g pnpm@10.17.1

      - run: pnpm install --frozen-lockfile

      - name: Build tokens package
        run: |
          cd packages/tokens
          node tasks/buildSpectrumTokens.js
          node tasks/buildManifest.js

      # Use the official changesets/action here — NOT the GarthDB fork.
      # The GarthDB fork only supports `publish:` and silently ignores `version:`,
      # so it never creates the Version Packages PR. The official action supports
      # both parameters independently. The fork is still used in the `release` job
      # where `oidcAuth: true` is needed for npm trusted publishing.
      #
      # `pnpm run version` runs the package.json "version" script
      # (`changeset version && moon run :version`). The explicit `run` is
      # required — bare `pnpm version` collides with pnpm's built-in npm-style
      # version command and would NOT execute the script. The Moon step
      # (sync-cargo-version.mjs) mirrors the bumped npm version into the
      # tui/Cargo.toml file.
      - name: Create or update Version Packages PR
        id: cs
        uses: changesets/action@v1
        with:
          commit: "chore: release"
          title: "Version Packages"
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── Phase 2a: build — runs on every version-PR merge ───────────────────────
  build-binaries:
    name: Build binary (${{ matrix.platform }})
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'false'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            runner: macos-latest
            ext: ""
          # Cross-compile x86_64-apple-darwin from the ARM runner — Rust tier-1
          # support for this target pair. Using macos-latest (ARM) avoids the
          # deprecated macos-13 pool which has much longer queue times.
          - target: x86_64-apple-darwin
            platform: darwin-x64
            runner: macos-latest
            ext: ""
          - target: x86_64-unknown-linux-gnu
            platform: linux-x64
            runner: ubuntu-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            platform: win32-x64
            runner: windows-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"

      - run: npm install -g pnpm@10.17.1

      # --ignore-scripts skips prepare hooks (e.g. docs/s2-tokens-viewer uses
      # `mkdir -p` which is not available on the Windows runner).
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # Regenerate sdk/core/src/registry_data.rs before cargo build.
      # We run sdk:codegen (not codegen-check) because codegen-check compares
      # file content as strings and fails on Windows when git checks out the
      # committed LF file with CRLF endings.
      - name: Set up moonrepo
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Regenerate registry data
        run: moon run sdk:codegen
        working-directory: .

      - name: Build binary
        run: cargo build --release --package design-data-cli --target ${{ matrix.target }}
        working-directory: sdk

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.platform }}
          cp sdk/target/${{ matrix.target }}/release/design-data${{ matrix.ext }} \
             dist/${{ matrix.platform }}/design-data${{ matrix.ext }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-data-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/design-data${{ matrix.ext }}
          retention-days: 1

  # ── Phase 2b: publish ───────────────────────────────────────────────────────
  release:
    name: Publish to npm
    needs: [changesets, build-binaries]
    # Runs on any version-PR merge. Only blocks on an actual binary build
    # failure: 'skipped' (nothing to compile) and 'success' both proceed,
    # while 'failure' aborts the publish.
    if: |
      !cancelled() &&
      needs.changesets.outputs.hasChangesets == 'false' &&
      needs.build-binaries.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"

      # npm 11.6.2 required for OIDC trusted publishing
      - run: npm install -g npm@11.6.2

      - run: npm install -g pnpm@10.17.1

      - run: pnpm install --frozen-lockfile

      - name: Build tokens package
        run: |
          cd packages/tokens
          node tasks/buildSpectrumTokens.js
          node tasks/buildManifest.js

      - name: Publish packages
        id: cs
        uses: GarthDB/changesets-action@v1.6.8
        with:
          publish: pnpm release
          oidcAuth: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # Download the binaries built by build-binaries and attach them to the
      # GitHub Release tagged by the design-data-cli Cargo.toml version.
      # Skipped when build-binaries did not succeed (e.g. it was skipped due
      # to no code changes that affect the binary — currently build-binaries
      # always runs on version-PR merge, so this only fires on build failure).
      - name: Download binary artifacts
        if: needs.build-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: design-data-*
          merge-multiple: false

      - name: Attach binaries to GitHub Release
        if: needs.build-binaries.result == 'success'
        shell: bash
        run: |
          CLI_VERSION=$(grep '^version' sdk/cli/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="design-data-cli@${CLI_VERSION}"
          # Create the release if it doesn't exist yet; --notes-file requires a
          # file so we inline a brief message. || true so a pre-existing release
          # doesn't abort the workflow.
          gh release create "${TAG}" \
            --title "design-data CLI ${CLI_VERSION}" \
            --notes "Native CLI binary for \`design-data\` v${CLI_VERSION}. Install via \`cargo install design-data-cli\` or download below." \
            || true
          for platform in darwin-arm64 darwin-x64 linux-x64; do
            gh release upload "${TAG}" \
              "design-data-${platform}/design-data" \
              --clobber
          done
          gh release upload "${TAG}" \
            "design-data-win32-x64/design-data.exe" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
